name: Alert Scan

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:      # Manual trigger button

jobs:
  scan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install sgmllib3k
          sudo apt-get install -y libasound2t64 2>/dev/null || true
          playwright install --with-deps chromium

      - name: Restore alert state
        uses: actions/cache/restore@v4.2.3
        with:
          path: state.json
          key: alert-state-${{ github.run_id }}
          restore-keys: alert-state

      - name: Run alert scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --mode alert

      - name: Save alert state
        uses: actions/cache/save@v4.2.3
        if: always()
        with:
          path: state.json
          key: alert-state-${{ github.run_id }}
